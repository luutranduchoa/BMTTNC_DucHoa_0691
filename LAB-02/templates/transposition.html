<!DOCTYPE html>
<html lang="en">
<head>
    <title>Transposition Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>

<body>
<div class="container">
<table class="table">

<tr>
<td style="text-align:center;font-weight:bold;font-size:25px;">
TRANSPOSITION CIPHER
</td>
</tr>

<tr>
<td style="font-weight:bold;color:blue">ENCRYPTION</td>
</tr>

<tr>
<td>
<form method="POST" action="/transposition">

<div class="mb-3">
<label>Plain text:</label>
<input type="text" class="form-control"
name="plainText"
placeholder="Input Plain Text" required>
</div>

<div class="mb-3">
<label>Key:</label>
<input type="number" class="form-control"
name="keyEncrypt"
placeholder="Input Key" required>
</div>

<button type="submit" class="btn btn-primary">
Encrypt
</button>

{% if encrypted_result %}
<div class="alert alert-info mt-3">
Encrypted Text: {{ encrypted_result }}
</div>
{% endif %}

</form>
</td>
</tr>


<tr>
<td style="font-weight:bold;color:blue">DECRYPTION</td>
</tr>

<tr>
<td>
<form method="POST" action="/transposition">

<div class="mb-3">
<label>Cipher text:</label>
<input type="text" class="form-control"
name="cipherText"
placeholder="Input Cipher Text" required>
</div>

<div class="mb-3">
<label>Key:</label>
<input type="number" class="form-control"
name="keyDecrypt"
placeholder="Input Key" required>
</div>

<button type="submit" class="btn btn-success">
Decrypt
</button>

{% if decrypted_result %}
<div class="alert alert-success mt-3">
Decrypted Text: {{ decrypted_result }}
</div>
{% endif %}

</form>
</td>
</tr>

</table>
</div>
</body>
</html>
